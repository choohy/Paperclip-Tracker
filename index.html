<script>import { useState, useEffect, useRef, useCallback } from "react";
import { RotateCcw, ChevronLeft, ChevronRight, Flame, Trophy, X } from "lucide-react";

const TOTAL_CLIPS = 100;
const DEFAULT_DAILY_TARGET = 20;
const WEEKLY_GOAL = 100;
const STORAGE_KEY = "paperclip-tracker-state-v1";
const GOAL_KEY = "paperclip-tracker-goal-v1";

function pad(n) { return String(n).padStart(2, "0"); }
function dateKey(d) { return `${d.getFullYear()}-${pad(d.getMonth() + 1)}-${pad(d.getDate())}`; }
function isWeekend(d) { const day = d.getDay(); return day === 0 || day === 6; }
function addDays(d, n) { return new Date(d.getFullYear(), d.getMonth(), d.getDate() + n); }
function sameDay(a, b) { return dateKey(a) === dateKey(b); }

function Jar({ label, percent, count, gradId, colorFrom, colorTo, onClick, clickable, pulse }) {
  const innerTop = 18, innerBottom = 168, innerHeight = innerBottom - innerTop;
  const fillHeight = Math.max(0, innerHeight * (percent / 100));
  const fillY = innerBottom - fillHeight;
  return (
    <div
      onClick={clickable ? onClick : undefined}
      style={{
        cursor: clickable ? "pointer" : "default",
        display: "flex",
        flexDirection: "column",
        alignItems: "center",
        userSelect: "none",
        transform: pulse ? "scale(1.04)" : "scale(1)",
        transition: "transform 0.15s ease",
      }}
    >
      <svg viewBox="0 0 140 200" width="150" height="215">
        <defs>
          <linearGradient id={gradId} x1="0" y1="1" x2="0" y2="0">
            <stop offset="0%" stopColor={colorFrom} />
            <stop offset="100%" stopColor={colorTo} />
          </linearGradient>
          <clipPath id={`clip-${gradId}`}>
            <path d="M18,18 L18,168 Q18,184 34,184 L106,184 Q122,184 122,168 L122,18 Z" />
          </clipPath>
        </defs>
        <rect x="32" y="4" width="76" height="18" rx="5" fill="none" stroke="#94a3b8" strokeWidth="3" />
        <path
          d="M18,18 L18,168 Q18,184 34,184 L106,184 Q122,184 122,168 L122,18 Z"
          fill="rgba(148,163,184,0.10)"
          stroke="#94a3b8"
          strokeWidth="3"
        />
        <g clipPath={`url(#clip-${gradId})`}>
          <rect
            x="14"
            y={fillY}
            width="112"
            height={fillHeight + 20}
            fill={`url(#${gradId})`}
            style={{ transition: "y 0.6s ease, height 0.6s ease" }}
          />
          {/* simple paperclip texture lines */}
          {percent > 4 && (
            <g opacity="0.35" style={{ transition: "opacity 0.4s" }}>
              {[0, 1, 2, 3, 4, 5].map((i) => (
                <line
                  key={i}
                  x1={26 + i * 16}
                  y1={Math.max(fillY + 6, 22)}
                  x2={26 + i * 16}
                  y2="178"
                  stroke="#ffffff"
                  strokeWidth="2"
                  strokeDasharray="4 3"
                />
              ))}
            </g>
          )}
        </g>
      </svg>
      <div style={{ fontWeight: 700, fontSize: 14, color: "#334155", marginTop: 2 }}>{label}</div>
      <div style={{ fontSize: 13, color: "#64748b" }}>{count} / {TOTAL_CLIPS}</div>
    </div>
  );
}

function ProgressBar({ value, max, colorFrom, colorTo, height = 10 }) {
  const pct = Math.min(100, (value / max) * 100);
  return (
    <div style={{ background: "#e2e8f0", borderRadius: 999, height, overflow: "hidden", width: "100%" }}>
      <div
        style={{
          height: "100%",
          width: `${pct}%`,
          background: `linear-gradient(90deg, ${colorFrom}, ${colorTo})`,
          borderRadius: 999,
          transition: "width 0.4s ease",
        }}
      />
    </div>
  );
}

export default function App() {
  const [loading, setLoading] = useState(true);
  const [fullCount, setFullCount] = useState(TOTAL_CLIPS);
  const [emptyCount, setEmptyCount] = useState(0);
  const [dailyLog, setDailyLog] = useState({});
  const [flyingClips, setFlyingClips] = useState([]);
  const [showCelebration, setShowCelebration] = useState(false);
  const [showResetConfirm, setShowResetConfirm] = useState(false);
  const [goal, setGoal] = useState("");
  const [goalInput, setGoalInput] = useState("");
  const [dailyTarget, setDailyTarget] = useState(DEFAULT_DAILY_TARGET);
  const [dailyTargetInput, setDailyTargetInput] = useState(String(DEFAULT_DAILY_TARGET));
  const [showGoalModal, setShowGoalModal] = useState(false);
  const [viewMonth, setViewMonth] = useState(() => {
    const d = new Date();
    return new Date(d.getFullYear(), d.getMonth(), 1);
  });
  const audioCtxRef = useRef(null);
  const hasLoadedRef = useRef(false);

  useEffect(() => {
    (async () => {
      try {
        const res = await window.storage.get(STORAGE_KEY, false);
        if (res && res.value) {
          const data = JSON.parse(res.value);
          setFullCount(typeof data.fullCount === "number" ? data.fullCount : TOTAL_CLIPS);
          setEmptyCount(typeof data.emptyCount === "number" ? data.emptyCount : 0);
          setDailyLog(data.dailyLog && typeof data.dailyLog === "object" ? data.dailyLog : {});
        }
        const gRes = await window.storage.get(GOAL_KEY, false);
        if (gRes && gRes.value) {
          const gData = JSON.parse(gRes.value);
          setGoal(gData.goal || "");
          const t = parseInt(gData.dailyTarget) || DEFAULT_DAILY_TARGET;
          setDailyTarget(t);
          setDailyTargetInput(String(t));
        } else {
          setShowGoalModal(true);
        }
      } catch (e) {
        // no saved state yet, defaults stand
      } finally {
        hasLoadedRef.current = true;
        setLoading(false);
      }
    })();
  }, []);

  const persist = useCallback(async (next) => {
    try {
      await window.storage.set(STORAGE_KEY, JSON.stringify(next), false);
    } catch (e) {
      console.error("save failed", e);
    }
  }, []);

  useEffect(() => {
    if (!hasLoadedRef.current) return;
    persist({ fullCount, emptyCount, dailyLog });
  }, [fullCount, emptyCount, dailyLog, persist]);

  function getCtx() {
    if (!audioCtxRef.current) {
      audioCtxRef.current = new (window.AudioContext || window.webkitAudioContext)();
    }
    return audioCtxRef.current;
  }

  function playChime() {
    try {
      const ctx = getCtx();
      const now = ctx.currentTime;
      [1318.51, 1975.53].forEach((freq, i) => {
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.type = "sine";
        osc.frequency.value = freq;
        gain.gain.setValueAtTime(i === 0 ? 0.22 : 0.07, now);
        gain.gain.exponentialRampToValueAtTime(0.001, now + 0.55);
        osc.connect(gain);
        gain.connect(ctx.destination);
        osc.start(now);
        osc.stop(now + 0.55);
      });
    } catch (e) {}
  }

  function playTrumpet() {
    try {
      const ctx = getCtx();
      const now = ctx.currentTime;
      const notes = [523.25, 659.25, 783.99, 1046.5];
      notes.forEach((freq, i) => {
        const start = now + i * 0.16;
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.type = "sawtooth";
        osc.frequency.value = freq;
        gain.gain.setValueAtTime(0.0001, start);
        gain.gain.linearRampToValueAtTime(0.22, start + 0.03);
        gain.gain.exponentialRampToValueAtTime(0.0001, start + 0.32);
        osc.connect(gain);
        gain.connect(ctx.destination);
        osc.start(start);
        osc.stop(start + 0.36);
      });
      const chordStart = now + notes.length * 0.16 + 0.05;
      [1046.5, 1318.51, 1568].forEach((freq) => {
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.type = "sawtooth";
        osc.frequency.value = freq;
        gain.gain.setValueAtTime(0.0001, chordStart);
        gain.gain.linearRampToValueAtTime(0.18, chordStart + 0.05);
        gain.gain.exponentialRampToValueAtTime(0.0001, chordStart + 1.0);
        osc.connect(gain);
        gain.connect(ctx.destination);
        osc.start(chordStart);
        osc.stop(chordStart + 1.05);
      });
    } catch (e) {}
  }

  function handleMoveClip() {
    if (fullCount <= 0 || loading) return;
    const id = `${Date.now()}-${Math.random()}`;
    setFlyingClips((prev) => [...prev, id]);
    setTimeout(() => {
      setFlyingClips((prev) => prev.filter((c) => c !== id));
      playChime();
      setFullCount((prev) => Math.max(0, prev - 1));
      setEmptyCount((prev) => {
        const next = Math.min(TOTAL_CLIPS, prev + 1);
        if (next >= TOTAL_CLIPS) {
          setTimeout(() => {
            playTrumpet();
            setShowCelebration(true);
          }, 80);
        }
        return next;
      });
      const today = new Date();
      const key = dateKey(today);
      setDailyLog((prev) => ({ ...prev, [key]: (prev[key] || 0) + 1 }));
    }, 520);
  }

  async function handleSaveGoal() {
    const trimmed = goalInput.trim();
    if (!trimmed) return;
    const t = Math.min(100, Math.max(1, parseInt(dailyTargetInput) || DEFAULT_DAILY_TARGET));
    setGoal(trimmed);
    setDailyTarget(t);
    setDailyTargetInput(String(t));
    setShowGoalModal(false);
    try { await window.storage.set(GOAL_KEY, JSON.stringify({ goal: trimmed, dailyTarget: t }), false); } catch (e) {}
  }

  function handleReset() {
    setFullCount(TOTAL_CLIPS);
    setEmptyCount(0);
    setShowResetConfirm(false);
    setShowCelebration(false);
  }

  function computeStreak(log) {
    let streak = 0;
    let cursor = new Date();
    let isToday = true;
    let guard = 0;
    while (guard < 3650) {
      guard++;
      if (isWeekend(cursor)) {
        cursor = addDays(cursor, -1);
        isToday = false;
        continue;
      }
      const key = dateKey(cursor);
      const count = log[key] || 0;
      if (count >= 1) {
        streak++;
        cursor = addDays(cursor, -1);
        isToday = false;
        continue;
      }
      if (isToday) {
        // today's weekday isn't done yet — don't break, just don't count it
        isToday = false;
        cursor = addDays(cursor, -1);
        continue;
      }
      break;
    }
    return streak;
  }

  function computeWeekTotal(log) {
    const today = new Date();
    const dow = today.getDay();
    const diffToMonday = dow === 0 ? -6 : 1 - dow;
    const monday = addDays(today, diffToMonday);
    let total = 0;
    for (let i = 0; i < 5; i++) {
      const d = addDays(monday, i);
      if (d > today) break;
      total += log[dateKey(d)] || 0;
    }
    return total;
  }

  const today = new Date();
  const todayKey = dateKey(today);
  const todayCount = dailyLog[todayKey] || 0;
  const streak = computeStreak(dailyLog);
  const weekTotal = computeWeekTotal(dailyLog);
  const fullPercent = (fullCount / TOTAL_CLIPS) * 100;
  const emptyPercent = (emptyCount / TOTAL_CLIPS) * 100;

  // calendar grid
  const monthLabel = viewMonth.toLocaleDateString(undefined, { month: "long", year: "numeric" });
  const firstOfMonth = viewMonth;
  const startDow = firstOfMonth.getDay(); // 0 = Sun
  const daysInMonth = new Date(viewMonth.getFullYear(), viewMonth.getMonth() + 1, 0).getDate();
  const cells = [];
  for (let i = 0; i < startDow; i++) cells.push(null);
  for (let d = 1; d <= daysInMonth; d++) cells.push(new Date(viewMonth.getFullYear(), viewMonth.getMonth(), d));

  if (loading) {
    return (
      <div style={{ padding: 40, textAlign: "center", color: "#64748b", fontFamily: "system-ui, sans-serif" }}>
        Loading your jars…
      </div>
    );
  }

  return (
    <div
      style={{
        fontFamily: "system-ui, -apple-system, sans-serif",
        maxWidth: 560,
        margin: "0 auto",
        padding: "20px 16px 32px",
        position: "relative",
      }}
    >
      <style>{`
        @keyframes flyAcross {
          0%   { left: 26%; top: 46%; transform: translate(-50%,-50%) scale(1) rotate(0deg); opacity: 1; }
          45%  { left: 50%; top: 14%; transform: translate(-50%,-50%) scale(1.25) rotate(160deg); opacity: 1; }
          100% { left: 74%; top: 46%; transform: translate(-50%,-50%) scale(0.85) rotate(360deg); opacity: 1; }
        }
        @keyframes popIn {
          0% { transform: scale(0.7); opacity: 0; }
          100% { transform: scale(1); opacity: 1; }
        }
        @keyframes confettiFall {
          0% { transform: translateY(-20px) rotate(0deg); opacity: 1; }
          100% { transform: translateY(220px) rotate(360deg); opacity: 0; }
        }
      `}</style>

      <h2 style={{ textAlign: "center", color: "#1e293b", marginBottom: 4 }}>📎 Paperclip Progress</h2>
      {goal && (
        <div style={{ textAlign: "center", marginBottom: 14 }}>
          <span style={{ fontSize: 12, color: "#94a3b8" }}>Working towards: </span>
          <span
            onClick={() => { setGoalInput(goal); setShowGoalModal(true); }}
            style={{ fontSize: 13, fontWeight: 600, color: "#16a34a", cursor: "pointer", borderBottom: "1px dashed #16a34a" }}
            title="Click to update your goal"
          >
            {goal}
          </span>
        </div>
      )}
      <p style={{ textAlign: "center", color: "#64748b", fontSize: 13, marginTop: 0, marginBottom: 20 }}>
        Click the full jar to move a paperclip
      </p>

      {/* Jars */}
      <div
        style={{
          position: "relative",
          display: "flex",
          justifyContent: "space-around",
          alignItems: "flex-end",
          background: "linear-gradient(135deg, #eff6ff, #f0fdf4)",
          borderRadius: 20,
          padding: "20px 10px 10px",
          marginBottom: 18,
        }}
      >
        <Jar
          label="Full Jar"
          percent={fullPercent}
          count={fullCount}
          gradId="gradFull"
          colorFrom="#60a5fa"
          colorTo="#3b82f6"
          clickable={fullCount > 0}
          onClick={handleMoveClip}
        />
        <Jar
          label="Empty Jar"
          percent={emptyPercent}
          count={emptyCount}
          gradId="gradEmpty"
          colorFrom="#4ade80"
          colorTo="#16a34a"
          clickable={false}
          pulse={emptyCount >= TOTAL_CLIPS}
        />

        {flyingClips.map((id) => (
          <div
            key={id}
            style={{
              position: "absolute",
              left: "26%",
              top: "46%",
              width: 22,
              height: 12,
              border: "3px solid #f472b6",
              borderRadius: 6,
              background: "transparent",
              animation: "flyAcross 0.52s ease-in-out forwards",
              pointerEvents: "none",
            }}
          />
        ))}
      </div>

      {fullCount === 0 && emptyCount < TOTAL_CLIPS && (
        <p style={{ textAlign: "center", color: "#94a3b8", fontSize: 12, marginTop: -10, marginBottom: 14 }}>
          All clips moved for this round.
        </p>
      )}

      {/* Reset */}
      <div style={{ display: "flex", justifyContent: "center", gap: 8, marginBottom: 22 }}>
        {!showResetConfirm ? (
          <>
            <button
              onClick={() => setShowResetConfirm(true)}
              style={{
                display: "flex",
                alignItems: "center",
                gap: 6,
                background: "#fff",
                border: "1px solid #e2e8f0",
                borderRadius: 999,
                padding: "8px 16px",
                fontSize: 13,
                color: "#475569",
                cursor: "pointer",
              }}
            >
              <RotateCcw size={14} /> Reset jars
            </button>
            <button
              onClick={() => { setGoalInput(goal); setShowGoalModal(true); }}
              style={{
                display: "flex",
                alignItems: "center",
                gap: 6,
                background: "#fff",
                border: "1px solid #e2e8f0",
                borderRadius: 999,
                padding: "8px 16px",
                fontSize: 13,
                color: "#475569",
                cursor: "pointer",
              }}
            >
              🎯 Set new goal
            </button>
          </>
        ) : (
          <div style={{ display: "flex", flexWrap: "wrap", alignItems: "center", gap: 8, fontSize: 13, color: "#475569", justifyContent: "center" }}>
            <span>Reset jars to 100 / 0? (streak stays)</span>
            <button
              onClick={handleReset}
              style={{ background: "#ef4444", color: "#fff", border: "none", borderRadius: 8, padding: "6px 12px", cursor: "pointer" }}
            >
              Yes, reset
            </button>
            <button
              onClick={() => setShowResetConfirm(false)}
              style={{ background: "#e2e8f0", color: "#334155", border: "none", borderRadius: 8, padding: "6px 12px", cursor: "pointer" }}
            >
              Cancel
            </button>
          </div>
        )}
      </div>

      {/* Goals */}
      <div style={{ background: "#fff", border: "1px solid #e2e8f0", borderRadius: 16, padding: 16, marginBottom: 18 }}>
        <div style={{ marginBottom: 14 }}>
          <div style={{ display: "flex", justifyContent: "space-between", fontSize: 13, color: "#334155", marginBottom: 6 }}>
            <span>Today's target</span>
            <span style={{ fontWeight: 600 }}>{todayCount} / {dailyTarget}</span>
          </div>
          <ProgressBar value={todayCount} max={dailyTarget} colorFrom="#f472b6" colorTo="#ec4899" />
        </div>
        <div>
          <div style={{ display: "flex", justifyContent: "space-between", fontSize: 13, color: "#334155", marginBottom: 6 }}>
            <span>This week's goal</span>
            <span style={{ fontWeight: 600 }}>{weekTotal} / {WEEKLY_GOAL}</span>
          </div>
          <ProgressBar value={weekTotal} max={WEEKLY_GOAL} colorFrom="#60a5fa" colorTo="#3b82f6" />
        </div>
      </div>

      {/* Streak */}
      <div
        style={{
          display: "flex",
          alignItems: "center",
          gap: 8,
          justifyContent: "center",
          marginBottom: 16,
          color: "#475569",
          fontSize: 14,
        }}
      >
        <Flame size={18} color="#ec4899" />
        <span>
          <strong>{streak}</strong> weekday streak
        </span>
      </div>

      {/* Calendar */}
      <div style={{ background: "#fff", border: "1px solid #e2e8f0", borderRadius: 16, padding: 16 }}>
        <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 10 }}>
          <button
            onClick={() => setViewMonth(new Date(viewMonth.getFullYear(), viewMonth.getMonth() - 1, 1))}
            style={{ background: "none", border: "none", cursor: "pointer", color: "#64748b" }}
          >
            <ChevronLeft size={18} />
          </button>
          <div style={{ fontWeight: 600, color: "#1e293b", fontSize: 14 }}>{monthLabel}</div>
          <button
            onClick={() => setViewMonth(new Date(viewMonth.getFullYear(), viewMonth.getMonth() + 1, 1))}
            style={{ background: "none", border: "none", cursor: "pointer", color: "#64748b" }}
          >
            <ChevronRight size={18} />
          </button>
        </div>
        <div style={{ display: "grid", gridTemplateColumns: "repeat(7, 1fr)", gap: 4, fontSize: 11, color: "#94a3b8", marginBottom: 4 }}>
          {["S", "M", "T", "W", "T", "F", "S"].map((d, i) => (
            <div key={i} style={{ textAlign: "center" }}>{d}</div>
          ))}
        </div>
        <div style={{ display: "grid", gridTemplateColumns: "repeat(7, 1fr)", gap: 4 }}>
          {cells.map((d, i) => {
            if (!d) return <div key={i} />;
            const weekend = isWeekend(d);
            const key = dateKey(d);
            const done = (dailyLog[key] || 0) >= 1;
            const isToday = sameDay(d, today);
            const isFuture = d > today;
            let bg = "transparent";
            let color = "#cbd5e1";
            let border = "1px solid transparent";
            if (weekend) {
              bg = "#f8fafc";
              color = "#cbd5e1";
            } else if (done) {
              bg = "linear-gradient(135deg, #4ade80, #16a34a)";
              color = "#fff";
            } else if (!isFuture) {
              bg = "#fef2f2";
              color = "#fca5a5";
            } else {
              color = "#94a3b8";
            }
            if (isToday) border = "2px solid #ec4899";
            return (
              <div
                key={i}
                title={weekend ? "Weekend (not tracked)" : done ? "Completed" : isFuture ? "" : "Missed"}
                style={{
                  aspectRatio: "1",
                  display: "flex",
                  alignItems: "center",
                  justifyContent: "center",
                  borderRadius: 8,
                  background: bg,
                  color,
                  fontSize: 12,
                  fontWeight: isToday ? 700 : 500,
                  border,
                }}
              >
                {d.getDate()}
              </div>
            );
          })}
        </div>
        <div style={{ display: "flex", gap: 14, justifyContent: "center", marginTop: 12, fontSize: 11, color: "#94a3b8" }}>
          <span style={{ display: "flex", alignItems: "center", gap: 4 }}>
            <span style={{ width: 10, height: 10, borderRadius: 3, background: "linear-gradient(135deg,#4ade80,#16a34a)" }} /> Done
          </span>
          <span style={{ display: "flex", alignItems: "center", gap: 4 }}>
            <span style={{ width: 10, height: 10, borderRadius: 3, background: "#fef2f2", border: "1px solid #fca5a5" }} /> Missed
          </span>
          <span style={{ display: "flex", alignItems: "center", gap: 4 }}>
            <span style={{ width: 10, height: 10, borderRadius: 3, background: "#f8fafc", border: "1px solid #e2e8f0" }} /> Weekend
          </span>
        </div>
      </div>

      <div style={{ textAlign: "center", marginTop: 22, fontSize: 12, color: "#94a3b8" }}>
        Brought to you by{" "}
        <a
          href="https://www.linkedin.com/company/froggy-fun-factory/"
          target="_blank"
          rel="noopener noreferrer"
          style={{ color: "#16a34a", fontWeight: 600, textDecoration: "none" }}
        >
          Froggy Fun Factory 🐸
        </a>
      </div>

      {/* Goal modal */}
      {showGoalModal && (
        <div style={{ position: "fixed", inset: 0, background: "rgba(15,23,42,0.55)", display: "flex", alignItems: "center", justifyContent: "center", zIndex: 60 }}>
          <div style={{ background: "#fff", borderRadius: 20, padding: "32px 28px", maxWidth: 340, width: "90%", animation: "popIn 0.3s ease", textAlign: "center" }}>
            <div style={{ fontSize: 36, marginBottom: 10 }}>🎯</div>
            <h3 style={{ margin: "0 0 8px", color: "#1e293b", fontSize: 17 }}>What's your goal?</h3>
            <p style={{ color: "#64748b", fontSize: 13, marginBottom: 20 }}>
              What are you working towards that requires repeated daily tracking?
            </p>
            <textarea
              autoFocus
              value={goalInput}
              onChange={(e) => setGoalInput(e.target.value)}
              onKeyDown={(e) => { if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); handleSaveGoal(); } }}
              placeholder="e.g. Building a daily writing habit, training for a marathon…"
              rows={3}
              style={{
                width: "100%",
                borderRadius: 10,
                border: "1px solid #e2e8f0",
                padding: "10px 12px",
                fontSize: 13,
                color: "#334155",
                resize: "none",
                outline: "none",
                boxSizing: "border-box",
                marginBottom: 16,
                fontFamily: "inherit",
              }}
            />
            <div style={{ marginBottom: 20, textAlign: "left" }}>
              <label style={{ fontSize: 13, fontWeight: 600, color: "#334155", display: "block", marginBottom: 8 }}>
                Daily paperclip target
              </label>
              <div style={{ display: "flex", gap: 8, flexWrap: "wrap" }}>
                {[5, 10, 20, 50, 100].map((n) => (
                  <button
                    key={n}
                    onClick={() => setDailyTargetInput(String(n))}
                    style={{
                      padding: "6px 14px",
                      borderRadius: 999,
                      border: `2px solid ${dailyTargetInput === String(n) ? "#16a34a" : "#e2e8f0"}`,
                      background: dailyTargetInput === String(n) ? "#f0fdf4" : "#fff",
                      color: dailyTargetInput === String(n) ? "#16a34a" : "#64748b",
                      fontSize: 13,
                      fontWeight: 600,
                      cursor: "pointer",
                    }}
                  >
                    {n}
                  </button>
                ))}
                <input
                  type="number"
                  min={1}
                  max={100}
                  value={dailyTargetInput}
                  onChange={(e) => setDailyTargetInput(e.target.value)}
                  placeholder="custom"
                  style={{
                    width: 72,
                    borderRadius: 999,
                    border: "2px solid #e2e8f0",
                    padding: "6px 10px",
                    fontSize: 13,
                    color: "#334155",
                    outline: "none",
                    textAlign: "center",
                  }}
                />
              </div>
              <p style={{ fontSize: 11, color: "#94a3b8", marginTop: 6, marginBottom: 0 }}>
                Default is 20 · max 100 per day
              </p>
            </div>
            <div style={{ display: "flex", gap: 8, justifyContent: "center" }}>
              {goal && (
                <button
                  onClick={() => setShowGoalModal(false)}
                  style={{ background: "#f1f5f9", border: "none", borderRadius: 999, padding: "10px 18px", fontSize: 13, color: "#475569", cursor: "pointer" }}
                >
                  Cancel
                </button>
              )}
              <button
                onClick={handleSaveGoal}
                disabled={!goalInput.trim()}
                style={{
                  background: goalInput.trim() ? "linear-gradient(135deg,#16a34a,#3b82f6)" : "#e2e8f0",
                  color: goalInput.trim() ? "#fff" : "#94a3b8",
                  border: "none",
                  borderRadius: 999,
                  padding: "10px 22px",
                  fontSize: 13,
                  fontWeight: 600,
                  cursor: goalInput.trim() ? "pointer" : "default",
                }}
              >
                Let's go! 🐸
              </button>
            </div>
          </div>
        </div>
      )}

      {/* Celebration overlay */}
      {showCelebration && (
        <div
          style={{
            position: "fixed",
            inset: 0,
            background: "rgba(15,23,42,0.55)",
            display: "flex",
            alignItems: "center",
            justifyContent: "center",
            zIndex: 50,
          }}
        >
          <div
            style={{
              position: "relative",
              background: "#fff",
              borderRadius: 20,
              padding: "32px 28px",
              textAlign: "center",
              maxWidth: 320,
              animation: "popIn 0.35s ease",
              overflow: "hidden",
            }}
          >
            {Array.from({ length: 16 }).map((_, i) => (
              <div
                key={i}
                style={{
                  position: "absolute",
                  top: -10,
                  left: `${(i * 6.2) % 100}%`,
                  width: 7,
                  height: 7,
                  borderRadius: 2,
                  background: ["#ec4899", "#3b82f6", "#16a34a", "#facc15"][i % 4],
                  animation: `confettiFall ${0.9 + (i % 5) * 0.15}s ease-in forwards`,
                  animationDelay: `${i * 0.04}s`,
                }}
              />
            ))}
            <Trophy size={40} color="#ec4899" style={{ marginBottom: 8 }} />
            <h3 style={{ margin: "8px 0 4px", color: "#1e293b" }}>Jar complete! 🎉</h3>
            <p style={{ color: "#64748b", fontSize: 13, marginBottom: 18 }}>
              All 100 paperclips made it across.
            </p>
            <button
              onClick={() => setShowCelebration(false)}
              style={{
                background: "linear-gradient(135deg,#3b82f6,#16a34a,#ec4899)",
                color: "#fff",
                border: "none",
                borderRadius: 999,
                padding: "10px 22px",
                fontSize: 13,
                fontWeight: 600,
                cursor: "pointer",
              }}
            >
              Nice!
            </button>
            <button
              onClick={() => setShowCelebration(false)}
              style={{
                position: "absolute",
                top: 10,
                right: 10,
                background: "none",
                border: "none",
                color: "#94a3b8",
                cursor: "pointer",
              }}
            >
              <X size={16} />
            </button>
          </div>
        </div>
      )}
    </div>
  );
}
</script>
